<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.06"/>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Outer Border -->
  <rect x="10" y="10" width="380" height="380" rx="20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Vector Silhouette -->
  <g filter="url(#shadow)">
    <rect x="110" y="40" width="180" height="320" rx="24" fill="#1a1a1a" /><rect x="116" y="46" width="168" height="308" rx="18" fill="#f8fafc" /><rect x="170" y="54" width="60" height="12" rx="6" fill="#1a1a1a" /><circle cx="200" cy="200" r="40" fill="#2563eb" opacity="0.1"/><path d="M170,200 L230,200 M200,170 L200,230" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  </g>
  
  <!-- Branding & Text overlays -->
  <text x="30" y="45" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="800" fill="#2563eb" letter-spacing="1">SAMSUNG</text>
  <text x="30" y="355" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">Galaxy S25 Ultra Pro</text>
  <text x="30" y="372" font-family="sans-serif" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">FRONT VIEW</text>
  
  <!-- Decorative corner accent -->
  <circle cx="355" cy="45" r="8" fill="#2563eb" opacity="0.3"/>
</svg>
