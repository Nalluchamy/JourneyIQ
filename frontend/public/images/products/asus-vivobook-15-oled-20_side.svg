<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.06"/>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Outer Border -->
  <rect x="10" y="10" width="380" height="380" rx="20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Vector Silhouette -->
  <g filter="url(#shadow)">
    <path d="M80,260 L320,260 L340,340 L60,340 Z" fill="#94a3b8" /><line x1="80" y1="260" x2="160" y2="120" stroke="#475569" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Branding & Text overlays -->
  <text x="30" y="45" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="800" fill="#2563eb" letter-spacing="1">ASUS</text>
  <text x="30" y="355" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">Vivobook 15 OLED</text>
  <text x="30" y="372" font-family="sans-serif" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">SIDE VIEW</text>
  
  <!-- Decorative corner accent -->
  <circle cx="355" cy="45" r="8" fill="#2563eb" opacity="0.3"/>
</svg>
