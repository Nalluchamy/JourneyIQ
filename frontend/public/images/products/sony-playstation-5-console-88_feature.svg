<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.06"/>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Outer Border -->
  <rect x="10" y="10" width="380" height="380" rx="20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Vector Silhouette -->
  <g filter="url(#shadow)">
    <rect x="120" y="100" width="160" height="200" rx="12" fill="#2563eb" opacity="0.8" /><path d="M120,130 L280,130 M120,270 L280,270" stroke="#ffffff" stroke-width="2" opacity="0.3"/><circle cx="200" cy="200" r="25" fill="#ffffff" opacity="0.2"/>
  </g>
  
  <!-- Branding & Text overlays -->
  <text x="30" y="45" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="800" fill="#2563eb" letter-spacing="1">SONY</text>
  <text x="30" y="355" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">PlayStation 5 Console</text>
  <text x="30" y="372" font-family="sans-serif" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">FEATURE VIEW</text>
  
  <!-- Decorative corner accent -->
  <circle cx="355" cy="45" r="8" fill="#2563eb" opacity="0.3"/>
</svg>
