[tool.black]
line-length = 88
target-version = ['py313']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
# Enable common lint rule categories
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "C",     # flake8-comprehensions
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "ASYNC", # flake8-async
    "S",     # flake8-bandit
    "RUF"    # Ruff-specific rules
]
ignore = [
    "S101", # Allow assert statements in tests
    "B008", # Allow function calls (like Depends) in argument defaults (FastAPI standard)
    "S105", # Ignore hardcoded password warning in config templates
    "S106", # Ignore hardcoded passwords in test code parameter passing
    "S311", # Ignore standard random generator warnings for seeding scripts
    "E712", # Ignore boolean comparison checks (SQLAlchemy requires == False)
    "C901", # Ignore function complexity checks for endpoints and seed scripts
    "UP046", # Ignore Generic[T] warning to preserve Pydantic v2 backwards compatibility
    "E501",  # Ignore line too long
    "B904",  # Ignore raise without from
    "S301",  # Ignore pickle load warning
    "E402",  # Ignore module level import not at top of file
    "S324",  # Ignore insecure md5 hash warnings
    "S110",  # Ignore try-except-pass blocks
    "F841",  # Ignore unused local variables
    "ASYNC230", # Ignore blocking file open in async
    "B007",  # Ignore unused loop variables
    "C416",  # Ignore unnecessary dict comprehensions
    "E741",  # Ignore ambiguous variable names in test helpers
    "ASYNC240", # Ignore os.path checks in async test contexts
    "S603",  # Ignore subprocess check warnings in devops tests
    "RUF059", # Ignore unused unpacked variable warnings
    "C403",  # Ignore list comprehension in set constructor
]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_any_generics = true
check_untyped_defs = true
no_implicit_reexport = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unused_configs = true
show_error_codes = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
