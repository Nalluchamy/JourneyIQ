name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r JourneyIQ/backend/requirements.txt

      - name: Run Ruff Linter
        run: ruff check JourneyIQ/backend

      - name: Run Black Formatter Check
        run: black --check JourneyIQ/backend

      - name: Run Isort Import Sorting Check
        run: isort --check-only JourneyIQ/backend

      - name: Run Mypy Type Checker
        run: mypy JourneyIQ/backend

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: JourneyIQ/frontend/package.json

      - name: Install Dependencies
        run: |
          cd JourneyIQ/frontend
          npm ci

      - name: Run ESLint Check
        run: |
          cd JourneyIQ/frontend
          npm run lint

      - name: Run Prettier Formatter Check
        run: |
          cd JourneyIQ/frontend
          npm run format:check

      - name: Build Frontend
        run: |
          cd JourneyIQ/frontend
          npm run build
