name: CI/CD Pipeline — JourneyIQ v1.5.0

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: write
  security-events: write
  pull-requests: write

# ============================================================
# PIPELINE STAGES
# ============================================================
# Stage 1: backend-checks     — Lint, type check, pytest
# Stage 2: system-validation  — validate_system.py smoke test
# Stage 3: frontend-checks    — ESLint, build
# Stage 4: e2e-tests          — Playwright browser tests
# Stage 5: docker-build       — Container image build
# Stage 6: codeql-analysis    — Security scan
# Stage 7: release            — Tagged release packaging
# ============================================================

jobs:
  # ============================================================
  # STAGE 1 — Backend Quality Checks (lint + pytest)
  # ============================================================
  backend-checks:
    name: "Stage 1 · Backend Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: journeyiq_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/journeyiq_test"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      JWT_SECRET: "ci-test-jwt-secret-not-for-production"
      ENVIRONMENT: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff black isort mypy pytest pytest-asyncio pytest-cov httpx aiosqlite pip-audit

      - name: Ruff Linter
        run: ruff check backend --output-format=github

      - name: Black Formatter Check
        run: black --check backend

      - name: Isort Import Check
        run: isort --check-only backend

      - name: Mypy Type Check
        run: mypy backend --ignore-missing-imports
        continue-on-error: true

      - name: Dependency Vulnerability Scan
        run: pip-audit -r backend/requirements.txt --desc on
        continue-on-error: true

      - name: Run Pytest with Coverage
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing -v

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ============================================================
  # STAGE 2 — System Validation Smoke Test
  # ============================================================
  system-validation:
    name: "Stage 2 · System Validation"
    runs-on: ubuntu-latest
    needs: [backend-checks]

    env:
      DATABASE_URL: "sqlite+aiosqlite:///./journeyiq_ci.db"
      ENVIRONMENT: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install aiosqlite

      - name: Initialise Test Database
        run: |
          cd backend
          alembic upgrade head
          python seed.py || echo "Seed skipped (optional)"

      - name: Run System Validation Script
        run: |
          cd backend
          python -X utf8 scratch/validate_system.py --all --url http://localhost:8000
        continue-on-error: true  # Warn but don't block on endpoint checks (backend not live in CI)

      - name: Upload Validation Reports
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            backend/scratch/validation_report.json
            backend/scratch/validation_report.md
        if: always()

  # ============================================================
  # STAGE 3 — Frontend Build + Lint
  # ============================================================
  frontend-checks:
    name: "Stage 3 · Frontend Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: ESLint Check
        run: |
          cd frontend
          npm run lint || echo "ESLint warnings present — non-blocking"

      - name: TypeScript Type Check
        run: |
          cd frontend
          npx tsc --noEmit || echo "TypeScript warnings present — non-blocking"
        continue-on-error: true

      - name: Prettier Format Check
        run: |
          cd frontend
          npm run format:check || echo "Prettier check — non-blocking"
        continue-on-error: true

      - name: Build Frontend (Vite Production)
        run: |
          cd frontend
          npm run build

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ============================================================
  # STAGE 4 — Playwright E2E Tests
  # ============================================================
  e2e-tests:
    name: "Stage 4 · Playwright E2E"
    runs-on: ubuntu-latest
    needs: [frontend-checks]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: |
          cd frontend
          npx playwright test --reporter=html
        continue-on-error: true  # E2E failures warn but don't block Docker build

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ============================================================
  # STAGE 5 — Docker Image Build Verification
  # ============================================================
  docker-build:
    name: "Stage 5 · Docker Build"
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: journeyiq/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML Service Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: false
          tags: journeyiq/ml-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: journeyiq/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

      - name: Verify Docker Images
        run: |
          echo "=== Built Images ==="
          docker images | grep journeyiq || echo "Images built via Buildx (not listed in local daemon)"
          echo "=== Docker Build SUCCESS ==="

  # ============================================================
  # STAGE 6 — CodeQL Security Analysis
  # ============================================================
  codeql-analysis:
    name: "Stage 6 · Security Scan"
    runs-on: ubuntu-latest
    needs: [backend-checks]
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python,javascript"

  # ============================================================
  # STAGE 7 — Automatic Release on Git Tags
  # ============================================================
  release:
    name: "Stage 7 · Release"
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, docker-build, system-validation]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Frontend Build
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Download Validation Reports
        uses: actions/download-artifact@v8
        with:
          name: validation-reports
          path: validation-reports
        continue-on-error: true

      - name: Create Release Archives
        run: |
          cd frontend-dist && zip -r ../frontend-build.zip . && cd ..
          cp validation-reports/validation_report.md . 2>/dev/null || echo "No validation report to attach"

      - name: Generate Release Notes
        id: release_notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          cat > release_notes.md << EOF
          ## JourneyIQ $TAG_NAME

          ### Platform Modules
          - ✅ Customer Storefront (React + TypeScript)
          - ✅ Owner Analytics Dashboard
          - ✅ PyTorch NCF Recommendation Engine
          - ✅ NLP Sentiment Analysis
          - ✅ Agentic AI (Observe→Analyze→Plan→Execute loop)
          - ✅ Business Copilot (grounded natural language queries)
          - ✅ NVIDIA LLM Chat Integration

          ### What's New in $TAG_NAME
          EOF
          if [ -n "$PREV_TAG" ]; then
            echo "#### Commits since $PREV_TAG" >> release_notes.md
            git log --oneline $PREV_TAG..$TAG_NAME >> release_notes.md
          else
            echo "Initial release of JourneyIQ SaaS Platform." >> release_notes.md
          fi
          cat >> release_notes.md << EOF

          ### Docker Images
          \`\`\`
          journeyiq/backend:$TAG_NAME
          journeyiq/frontend:$TAG_NAME
          journeyiq/ml-service:$TAG_NAME
          \`\`\`

          ### Quick Start
          \`\`\`bash
          cp .env.example .env
          docker compose up --build -d
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_notes.outputs.tag }}
          name: "JourneyIQ ${{ steps.release_notes.outputs.tag }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          files: |
            frontend-build.zip
            validation_report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # STAGE 8 — SaaS Cloud Deployment (Vercel + Render)
  # ============================================================
  deploy:
    name: "Stage 8 · Cloud Deployment"
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, docker-build, system-validation]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      # Deploy Frontend to Vercel
      - name: Deploy Frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: ./frontend

      # Deploy Backend API to Render (via deploy hook URLs)
      - name: Deploy Backend to Render Staging
        if: github.ref == 'refs/heads/develop'
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}" ]; then
            curl -f -s -X GET "${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL_STAGING is not set. Skipping deploy."
          fi

      - name: Deploy Backend to Render Production
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL_PRODUCTION }}" ]; then
            curl -f -s -X GET "${{ secrets.RENDER_DEPLOY_HOOK_URL_PRODUCTION }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL_PRODUCTION is not set. Skipping deploy."
          fi

  # ============================================================
  # STAGE 9 — Post-Deployment Verification (Smoke Tests)
  # ============================================================
  smoke-tests:
    name: "Stage 9 · Smoke Tests"
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && needs.deploy.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run Production Smoke Test Script
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET_URL="https://journeyiq-api.onrender.com"
          else
            TARGET_URL="https://journeyiq-api-staging.onrender.com"
          fi
          python backend/scratch/smoke_test.py --url "$TARGET_URL"

