name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff black isort mypy pytest pytest-asyncio pytest-cov pip-audit

      - name: Run Ruff Linter
        run: ruff check backend

      - name: Run Black Formatter Check
        run: black --check backend

      - name: Run Isort Import Sorting Check
        run: isort --check-only backend

      - name: Run Mypy Type Checker
        run: |
          # Create an empty .mypy.cache directory if needed
          mypy backend

      - name: Dependency Vulnerability Scan
        run: pip-audit -r backend/requirements.txt

      - name: Run Pytest Coverage
        run: |
          cd backend
          pytest --cov=app --cov-report=xml

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint Check
        run: |
          cd frontend
          npm run lint || echo "ESLint failed, continuing..."

      - name: Run Prettier Formatter Check
        run: |
          cd frontend
          npm run format:check || echo "Prettier check failed, continuing..."

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
