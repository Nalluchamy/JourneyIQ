apiVersion: v1
kind: Secret
metadata:
  name: journeyiq-secrets
  namespace: journeyiq
  labels:
    app: journeyiq
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:CHANGE_ME@db-host:5432/postgres"
  SECRET_KEY: "CHANGE_ME_TO_A_SECURE_RANDOM_KEY_AT_LEAST_32_CHARS"
  JWT_SECRET: "CHANGE_ME_TO_A_SECURE_RANDOM_JWT_SECRET_AT_LEAST_32"
  REDIS_URL: "redis://redis:6379/0"
