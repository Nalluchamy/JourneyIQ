apiVersion: apps/v1
kind: Deployment
metadata:
  name: journeyiq-backend
  namespace: journeyiq
  labels:
    app: journeyiq
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: journeyiq
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: journeyiq
        component: backend
    spec:
      containers:
        - name: backend
          image: journeyiq/backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: journeyiq-config
            - secretRef:
                name: journeyiq-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/system/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/system/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
            - name: log-storage
              mountPath: /app/logs
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: journeyiq-models-pvc
        - name: log-storage
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: journeyiq-frontend
  namespace: journeyiq
  labels:
    app: journeyiq
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: journeyiq
      component: frontend
  template:
    metadata:
      labels:
        app: journeyiq
        component: frontend
    spec:
      containers:
        - name: frontend
          image: journeyiq/frontend:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: journeyiq-ml-service
  namespace: journeyiq
  labels:
    app: journeyiq
    component: ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: journeyiq
      component: ml-service
  template:
    metadata:
      labels:
        app: journeyiq
        component: ml-service
    spec:
      containers:
        - name: ml-service
          image: journeyiq/ml-service:latest
          ports:
            - containerPort: 8001
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: journeyiq-models-pvc
  namespace: journeyiq
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
