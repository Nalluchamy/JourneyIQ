apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: journeyiq-ingress
  namespace: journeyiq
  labels:
    app: journeyiq
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.journeyiq.com
        - api.journeyiq.com
      secretName: journeyiq-tls
  rules:
    - host: www.journeyiq.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: journeyiq-frontend-svc
                port:
                  number: 80
    - host: api.journeyiq.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: journeyiq-backend-svc
                port:
                  number: 8000
