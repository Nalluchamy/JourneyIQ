version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: journeyiq_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Bqk6qtno8GRiMyMp}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - journeyiq_net_prod

  redis:
    image: redis:7-alpine
    container_name: journeyiq_redis_prod
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - journeyiq_net_prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: journeyiq_backend_prod
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-Bqk6qtno8GRiMyMp}@db:5432/${POSTGRES_DB:-postgres}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-https://www.journeyiq.com}
      - BACKEND_URL=${BACKEND_URL:-https://api.journeyiq.com}
      - ENVIRONMENT=production
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - journeyiq_net_prod

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: journeyiq_ml_service_prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - PORT=8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - journeyiq_net_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: journeyiq_frontend_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - journeyiq_net_prod

volumes:
  postgres_data_prod:

networks:
  journeyiq_net_prod:
    driver: bridge
